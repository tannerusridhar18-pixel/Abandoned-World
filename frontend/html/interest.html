<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/interest.css">
    <title>Abandoned World</title>
</head>
<body>
    <h1 class="title">Choose Your Interests</h1>
    <h3 class="subtitle">Which type of places are you interested in? (multiple allowed)</h3>

    <div class="interest-container">

        <div class="interest-box" data-value="Abandoned Places">
            🏚
            <span>Abandoned Places</span>
        </div>

        <div class="interest-box" data-value="Historical Sites">
            🏛
            <span>Historical Sites</span>
        </div>

        <div class="interest-box" data-value="Haunted Places">
            👻
            <span>Haunted Places</span>
        </div>

        <div class="interest-box" data-value="Lost Cities">
            🌄
            <span>Lost Cities</span>
        </div>

        <div class="interest-box" data-value="Mysterious Places">
            🕳
            <span>Mysterious Places</span>
        </div>

    </div>

    <button class="continue-btn">Continue</button>

    <script src="../js/interest.js"></script>
</body>
</html>
