<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned World - Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <script defer src="admin.js"></script>
   <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

<div class="admin-layout">
    
    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">🏚️</span>
                <div class="logo-text">
                    <span class="logo-main">ABANDONED</span>
                    <span class="logo-sub">ADMIN PANEL</span>
                </div>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <span class="nav-section-title">MAIN</span>
                <ul>
                    <li class="nav-item active" data-section="dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </li>
                    <li class="nav-item" data-section="places">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span>Manage Places</span>
                        <span class="badge" id="placesCount">0</span>
                    </li>
                    <li class="nav-item" data-section="categories">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"></path>
                        </svg>
                        <span>Categories</span>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">MANAGEMENT</span>
                <ul>
                    <li class="nav-item" data-section="users">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Users</span>
                        <span class="badge">120</span>
                    </li>
                    <li class="nav-item" data-section="submissions">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <span>Submissions</span>
                        <span class="badge pending">5</span>
                    </li>
                    <li class="nav-item" data-section="analytics">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="20" x2="12" y2="10"></line>
                            <line x1="18" y1="20" x2="18" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="16"></line>
                        </svg>
                        <span>Analytics</span>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">SYSTEM</span>
                <ul>
                    <li class="nav-item" data-section="settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m8.66-11l-5.2 3m-2.92 0-5.2-3M23 12l-6 0m-6 0H1m8.66 11l5.2-3m2.92 0l5.2 3"></path>
                        </svg>
                        <span>Settings</span>
                    </li>
                    <li class="nav-item logout-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Logout</span>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="admin-profile">
                <div class="avatar">A</div>
                <div class="profile-info">
                    <span class="profile-name">Admin</span>
                    <span class="profile-role">Administrator</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="main-content">
        
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title" id="sectionTitle">Dashboard</h1>
                <div class="breadcrumb" id="breadcrumb">
                    <span>Home</span>
                    <span class="separator">/</span>
                    <span class="current">Dashboard</span>
                </div>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" id="refreshBtn" title="Refresh">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <button class="icon-btn" id="notificationBtn" title="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="notification-dot"></span>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-wrapper">
            <section id="contentArea" class="content-area">
                <!-- Dynamic content loads here -->
            </section>
        </div>
    </main>

</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Modal Title</h3>
            <button class="modal-close" onclick="closeModal()" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Dynamic modal content -->
        </div>
    </div>
</div>

<!-- ================= CONFIRMATION DIALOG ================= -->
<div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-backdrop" onclick="closeConfirmDialog()"></div>
    <div class="confirm-container">
        <div class="confirm-icon">⚠️</div>
        <h3 class="confirm-title" id="confirmTitle">Are you sure?</h3>
        <p class="confirm-message" id="confirmMessage">This action cannot be undone.</p>
        <div class="confirm-actions">
            <button class="btn btn-secondary" onclick="closeConfirmDialog()">Cancel</button>
            <button class="btn btn-danger" id="confirmBtn">Confirm</button>
        </div>
    </div>
</div>

<!-- ================= TOAST NOTIFICATIONS ================= -->
<div class="toast-container" id="toastContainer"></div>

<!-- ================= LOADING OVERLAY ================= -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading...</p>
</div>

</body>
</html>
